<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="constentStyle.css" />
  </head>
  <body>
    <main>
      <div class="formDiv">
        <form class="form">
          <div class="formHeaderDiv">
            <h2>Add Transaction</h2>
            <p class="closeForm">x</p>
          </div>
          <div class="formGroup">
            <label for="type">Type</label>
            <select id="type" required>
              <option value="Expense">Expense</option>
              <option value="Income">Income</option>
            </select>
          </div>
          <div class="formGroup">
            <label for="description">Description</label>
            <input
              type="text"
              id="description"
              placeholder="e.g. Amazon, Salary, Coffee"
              required
            />
          </div>

          <div class="amountDiv">
            <div class="amountDivGroup">
              <label for="amount">Amount</label>
              <input
                type="number"
                name=""
                id="amount"
                step="0.01"
                min="0"
                required
              />
            </div>
            <div class="amountDivGroup">
              <label for="date">Date</label>
              <input type="date" name="" id="date" required />
            </div>
          </div>
          <div class="formGroup">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="">select a category</option>
              <option value="Food & Drinking">Food & Drinking</option>
              <option value="Shopping">Shopping</option>
              <option value="Recharge & Bills">Recharge & Bills</option>
              <option value="Petrol & Auto">Petrol & Auto</option>
              <option value="Utilities">Utilities</option>
              <option value="Salary">Salary</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <button type="submit">Save Transaction</button>
        </form>
      </div>
      <aside>
        <header>
          <i class="ri-stack-line"></i>
          <h1>
            FintTrack Pro <br />
            <span>Enterprise Finance</span>
          </h1>
        </header>
        <ul>
          <li class="active" data-page="dashboard.html">
            <i class="ri-dashboard-line"></i> Dashboard
          </li>
          <li class="" data-page="settings.html">
            <i class="ri-settings-4-fill"></i> Settings
          </li>
        </ul>
        <button class="addBtn">+ Add Transaction</button>
      </aside>
      <section class="container">
        <header>
          <div></div>
          <nav>
            <h1 id="username"></h1>
            <button id="logoutBtn">
              <i class="ri-logout-box-r-line"></i> Logout
            </button>
          </nav>
        </header>
        <section class="content"></section>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./constentScript.js"></script>
  </body>
</html>
